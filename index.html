<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Card Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="game-container">
        <div class="game-header">
            <h1 class="game-title">Memory Match</h1>
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-label">Moves</div>
                    <div class="stat-value" id="moveCount">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Pairs</div>
                    <div class="stat-value" id="pairCount">0/8</div>
                </div>
            </div>
        </div>

        <div class="card-grid" id="cardGrid"></div>

        <div class="win-message" id="winMessage"></div>

        <div class="btn-row">
            <button class="btn btn-primary" onclick="startGame()">New Game</button>
            <button class="btn btn-secondary" onclick="resetStats()">Reset Score</button>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
